<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로나 - 에린의 친근한 이웃</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 860px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        }

        /* ── 헤더 ── */
        .header {
            background: #3B82F6;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.4);
        }

        /* 추후 이미지 교체 시 img 태그가 이 안에 들어옵니다 */
        .header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-subtitle {
            color: rgba(255,255,255,0.82);
            font-size: 13px;
        }

        /* ── 채팅 영역 ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #ffffff;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #E5E7EB;
            border-radius: 4px;
        }

        /* ── 봇 메시지 ── */
        .msg-row.bot {
            display: flex;
            align-items: flex-start;
            gap: 9px;
        }

        .bot-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #EFF6FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid #DBEAFE;
        }

        .bot-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bot-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: calc(100% - 45px);
        }

        .bot-name-label {
            font-size: 12px;
            color: #6B7280;
            font-weight: 600;
            padding-left: 2px;
        }

        .bot-bubble {
            background: #F3F4F6;
            color: #111827;
            padding: 12px 15px;
            border-radius: 4px 18px 18px 18px;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .sources-wrap {
            font-size: 11px;
            color: #9CA3AF;
            padding-left: 4px;
            margin-top: 2px;
        }

        /* ── 사용자 메시지 ── */
        .msg-row.user {
            display: flex;
            justify-content: flex-end;
        }

        .user-bubble {
            background: #3B82F6;
            color: #ffffff;
            padding: 12px 15px;
            border-radius: 18px 4px 18px 18px;
            font-size: 14px;
            line-height: 1.7;
            max-width: 76%;
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* ── 로딩 점 애니메이션 ── */
        .loading-dots {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 2px 0;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9CA3AF;
            animation: dot-bounce 1.2s infinite ease-in-out;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        /* ── 하단 영역 ── */
        .bottom-area {
            background: #ffffff;
            padding: 10px 16px 16px;
            border-top: 1px solid #F3F4F6;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── 추천 질문 칩 ── */
        .chips-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 999px;
            padding: 7px 14px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .chip:hover {
            background: #EFF6FF;
            border-color: #BFDBFE;
            color: #1D4ED8;
        }

        /* ── 입력창 ── */
        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-wrap {
            flex: 1;
            background: #F9FAFB;
            border: 1.5px solid #E5E7EB;
            border-radius: 999px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            transition: border-color 0.15s;
        }

        .input-wrap:focus-within {
            border-color: #3B82F6;
            background: #ffffff;
        }

        .input-wrap input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 14px;
            color: #111827;
            font-family: inherit;
        }

        .input-wrap input::placeholder {
            color: #9CA3AF;
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #3B82F6;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
        }

        .send-btn:hover:not(:disabled) {
            background: #2563EB;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #93C5FD;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
            margin-left: 2px;
        }

        /* ── 모바일 반응형 ── */
        @media (max-width: 500px) {
            body {
                background: #ffffff;
            }
            .chat-container {
                border-radius: 0;
                max-height: 100vh;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">

    <!-- 헤더 -->
    <div class="header">
        <div class="header-avatar" id="headerAvatar">
            <img src="lona.png" alt="로나" onerror="this.replaceWith(document.createTextNode('🧝‍♀️'))">
        </div>
        <div class="header-info">
            <div class="header-name">로나</div>
            <div class="header-subtitle">에린의 친근한 이웃</div>
        </div>
    </div>

    <!-- 채팅 영역 -->
    <div class="chat-area" id="chatArea"></div>

    <!-- 하단 (칩 + 입력창) -->
    <div class="bottom-area">
        <div class="chips-area" id="chipsArea">
            <button class="chip" onclick="sendChip(this)">마이홈은 어떻게 얻을 수 있어?</button>
            <button class="chip" onclick="sendChip(this)">던바튼이 어디야?</button>
            <button class="chip" onclick="sendChip(this)">어비스 던전이 뭐야?</button>
        </div>
        <div class="input-row">
            <div class="input-wrap">
                <input
                    type="text"
                    id="userInput"
                    placeholder="로나에게 물어봐! (예: 마이홈이 뭐야?)"
                    onkeydown="handleKey(event)"
                    autocomplete="off"
                >
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="전송">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

</div>

<script>
    // ── API 설정 ──
    const API_URL = 'https://wipe-repurpose-endurance.ngrok-free.dev/webhook/rag-chat';

    // ── DOM 참조 ──
    const chatArea   = document.getElementById('chatArea');
    const userInput  = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');
    const chipsArea  = document.getElementById('chipsArea');

    let isLoading = false;

    // ── 추천 칩 클릭 ──
    function sendChip(el) {
        userInput.value = el.textContent.trim();
        sendMessage();
    }

    // ── 엔터 키 처리 ──
    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    // ── 사용자 말풍선 추가 ──
    function appendUserMessage(text) {
        const row = document.createElement('div');
        row.className = 'msg-row user';
        row.innerHTML = `<div class="user-bubble">${esc(text)}</div>`;
        chatArea.appendChild(row);
        scrollBottom();
    }

    // ── 봇 말풍선 추가 ──
    function appendBotMessage(text, sources) {
        const row = document.createElement('div');
        row.className = 'msg-row bot';

        let sourcesHtml = '';
        if (sources && sources.length > 0) {
            const list = sources.slice(0, 3).map(s => esc(String(s))).join(' &middot; ');
            sourcesHtml = `<div class="sources-wrap">출처: ${list}</div>`;
        }

        row.innerHTML = `
            <div class="bot-avatar"><img src="lona.png" alt="로나" onerror="this.replaceWith(document.createTextNode('🧝‍♀️'))"></div>
            <div class="bot-content">
                <div class="bot-name-label">로나</div>
                <div class="bot-bubble">${esc(text)}</div>
                ${sourcesHtml}
            </div>
        `;
        chatArea.appendChild(row);
        scrollBottom();
    }

    // ── 로딩 인디케이터 표시 ──
    function showLoading() {
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        row.id = 'loadingRow';
        row.innerHTML = `
            <div class="bot-avatar"><img src="lona.png" alt="로나" onerror="this.replaceWith(document.createTextNode('🧝‍♀️'))"></div>
            <div class="bot-content">
                <div class="bot-name-label">로나</div>
                <div class="bot-bubble">
                    <div class="loading-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        `;
        chatArea.appendChild(row);
        scrollBottom();
    }

    // ── 로딩 인디케이터 제거 ──
    function removeLoading() {
        const el = document.getElementById('loadingRow');
        if (el) el.remove();
    }

    // ── 메시지 전송 ──
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || isLoading) return;

        // 칩 숨기기 (첫 전송 이후 사라짐)
        chipsArea.style.display = 'none';

        isLoading = true;
        sendBtn.disabled = true;
        userInput.value = '';

        appendUserMessage(text);
        showLoading();

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                mode: 'cors',                          // CORS 명시
                headers: {
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify({ question: text })
            });

            // OPTIONS preflight나 비정상 응답 차단
            if (res.status === 0 || res.type === 'opaque') {
                throw new Error('CORS 차단 또는 네트워크 오류');
            }

            // HTTP 에러 코드 먼저 확인 (4xx, 5xx)
            if (!res.ok) {
                throw new Error(`서버 오류 (HTTP ${res.status})`);
            }

            // text()로 먼저 받아서 빈 응답 방어
            const rawText = await res.text();

            if (!rawText || rawText.trim() === '') {
                throw new Error('빈 응답');
            }

            // JSON 파싱 시도 — 실패 시 텍스트 그대로 표시
            let data;
            try {
                data = JSON.parse(rawText);
            } catch {
                // JSON이 아닌 텍스트(HTML 에러 페이지 등)가 왔을 때
                appendBotMessage('서버에서 올바른 응답을 받지 못했어. 잠시 후 다시 시도해줘! 😅');
                console.error('[로나] JSON 파싱 실패. 원본 응답:', rawText.slice(0, 200));
                return;
            }

            removeLoading();

            if (data.success && data.answer) {
                appendBotMessage(data.answer, data.sources);
            } else {
                appendBotMessage('앗, 답변을 가져오지 못했어! 잠시 후 다시 물어봐줘~ 😅');
            }

        } catch (err) {
            removeLoading();
            appendBotMessage('서버에 연결하지 못했어. 잠시 후 다시 시도해줘! 💦');
            console.error('[로나] 오류:', err.message);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // ── 스크롤 맨 아래로 ──
    function scrollBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // ── XSS 방지용 이스케이프 ──
    function esc(text) {
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/\n/g, '<br>');
    }
</script>

</body>
</html>
